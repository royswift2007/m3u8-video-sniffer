# ---------------------------------------------------------------------------
# security-stability-hardening task 26.3 / Requirement 29.2
# ---------------------------------------------------------------------------
#
# Starter mypy configuration for the R29 TaskSnapshot lint contract.
#
# Goal (per design Â§4.4 / R29.2): run ``mypy --strict`` in CI and fail the
# build when any caller tries to emit a raw ``DownloadTask`` through the
# R29 snapshot channel (``_emit_task_snapshot`` /
# ``task_update_received``). The choke point is the typed annotation on
# those methods; this config just makes the type error fatal.
#
# Scope is intentionally narrow. The legacy ``core/download_manager.py``
# shim, the engines, and the rest of ``ui/`` still have loose annotations
# and would drown a full-tree ``--strict`` run in noise. Broadening the
# scope is fine once those modules are cleaned up in later Stage 4 waves;
# tightening now would block the gate on pre-existing debt.
#
# To run locally:
#     mypy --config-file mypy.ini
#
# CI should invoke the same command; the R29 lint failure mode is any
# ``error: Argument 1 to "_emit_task_snapshot" has incompatible type
# "DownloadTask"; expected "TaskSnapshot"``-style message.

[mypy]
python_version = 3.11
# Global floor: we only want errors to fire inside the scoped per-module
# sections below. Everything else stays untyped so this config does not
# regress unrelated modules.
ignore_missing_imports = True
follow_imports = silent
warn_unused_configs = True
# Keep the global run quiet; strictness is opted-in per-module.
strict = False

# ---------------------------------------------------------------------------
# Scoped strict modules (R29.2 enforcement surface)
# ---------------------------------------------------------------------------
# ``ui/main_window.py`` owns the ``task_update_received`` slot and the
# ``_emit_task_snapshot`` choke point.
[mypy-ui.main_window]
strict = True
# PyQt6 ships partial stubs; tolerate the gaps rather than silence them.
warn_return_any = False
disallow_untyped_decorators = False

# ``core/task_model.py`` owns ``TaskSnapshot`` (frozen dataclass +
# ``to_dict`` serialization contract) and ``DownloadTask.transition``.
[mypy-core.task_model]
strict = True
warn_return_any = False
disallow_untyped_decorators = False

# ``core/download/*`` owns the snapshot producers
# (``DownloadManager._emit_snapshot`` / classifier / worker pool) that
# must only hand ``TaskSnapshot`` instances to the R29 channel.
[mypy-core.download.*]
strict = True
warn_return_any = False
disallow_untyped_decorators = False
